name: Build Mobywatel IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build App using SwiftPM
        run: |
          cd App
          
          echo "=== Budowanie aplikacji ==="
          
          # Budujemy bezpośrednio
          xcodebuild clean archive \
            -workspace . \
            -scheme "Mobywatel" \
            -sdk iphoneos \
            -archivePath ../build/Mobywatel.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO || \
          xcodebuild clean archive \
            -workspace . \
            -scheme "App" \
            -sdk iphoneos \
            -archivePath ../build/Mobywatel.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          ls -la build/
          xcodebuild -exportArchive \
            -archivePath build/Mobywatel.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build || echo "Export nieudany"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Mobywatel-IPA
          path: build/*.ipa
