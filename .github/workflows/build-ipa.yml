name: Build Mobywatel IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Xcode Project
        run: |
          cd App
          swift package generate-xcodeproj || true

      - name: Build & Archive
        run: |
          cd App
          echo "=== Buduję aplikację ==="
          xcodebuild clean archive \
            -project Mobywatel.xcodeproj \
            -scheme "Mobywatel" \
            -sdk iphoneos \
            -archivePath ../build/Mobywatel.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || cat

      - name: Export IPA
        run: |
          ls -la build/
          if [ -d "build/Mobywatel.xcarchive" ]; then
            echo "Archiwum istnieje - eksportuję .ipa"
            xcodebuild -exportArchive \
              -archivePath build/Mobywatel.xcarchive \
              -exportOptionsPlist ../ExportOptions.plist \
              -exportPath build
            ls -la build/
          else
            echo "❌ Brak xcarchive!"
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Mobywatel-IPA
          path: build/*.ipa
