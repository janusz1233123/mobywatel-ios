name: Build Mobywatel IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show project structure
        run: |
          ls -la
          echo "=== App folder ==="
          ls -la App
          echo "=== Package.swift ==="
          cat App/Package.swift

      - name: Result
        run: |
          echo "❌ Projekt jest pusty - nie da się zbudować .ipa"
          echo "Potrzebujesz pełnego kodu aplikacji (pliki .swift z widokami, Info.plist itd.)"
