name: Build Mobywatel IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Swift
        run: |
          cd App
          swift build --configuration release

      - name: Info
        run: |
          echo "Projekt jest pusty - nie ma jeszcze aplikacji do zbudowania na .ipa"
          echo "Potrzebujesz pełnego kodu aplikacji (z plikami .swift w Sources/App itd.)"
