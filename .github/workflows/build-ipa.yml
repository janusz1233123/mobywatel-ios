name: Build Mobywatel IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Xcode Project & Show Schemes
        run: |
          cd App
          swift package generate-xcodeproj || true
          
          echo "=== Pliki w folderze App ==="
          ls -la
          
          echo "=== Dostępne schematy ==="
          xcodebuild -list -project *.xcodeproj || echo "Brak xcodeproj"

      - name: Archive App
        run: |
          cd App
          
          xcodebuild clean archive \
            -project Mobywatel.xcodeproj \
            -scheme "Mobywatel" \
            -sdk iphoneos \
            -archivePath ../build/Mobywatel.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO || \
          xcodebuild clean archive \
            -project Mobywatel.xcodeproj \
            -scheme "Mobywatel-Package" \
            -sdk iphoneos \
            -archivePath ../build/Mobywatel.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/Mobywatel.xcarchive \
            -exportOptionsPlist ../ExportOptions.plist \
            -exportPath build

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Mobywatel-IPA
          path: build/*.ipa
