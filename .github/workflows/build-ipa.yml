name: Build Mobywatel IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug + Generate + Build
        run: |
          cd App
          
          echo "=== Generowanie projektu ==="
          swift package generate-xcodeproj --xcconfig-overrides .xcodebuild.xcconfig || true
          
          echo "=== Pliki ==="
          ls -la
          
          echo "=== Schematy ==="
          xcodebuild -list -project *.xcodeproj || echo "Brak projektu"
          
          echo "=== Próba builda ==="
          xcodebuild clean archive \
            -project Mobywatel.xcodeproj \
            -scheme "Mobywatel" \
            -sdk iphoneos \
            -archivePath ../build/Mobywatel.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -quiet || echo "Nie zadziałało z Mobywatel"

      - name: Export IPA
        run: |
          if [ -d "build/Mobywatel.xcarchive" ]; then
            xcodebuild -exportArchive \
              -archivePath build/Mobywatel.xcarchive \
              -exportOptionsPlist ExportOptions.plist \
              -exportPath build
          else
            echo "Nie ma archiwum - budowanie nie powiodło się"
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Mobywatel-IPA
          path: build/*.ipa
