name: Build Mobywatel IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - Generate Project & List Schemes
        run: |
          cd App
          swift package generate-xcodeproj --xcconfig-overrides .xcodebuild.xcconfig || true
          
          echo "=== Pliki w App ==="
          ls -la
          
          echo "=== Dostępne schematy ==="
          xcodebuild -list -project *.xcodeproj || echo "Nie znaleziono xcodeproj"

      - name: Archive (próbujemy różne nazwy schematów)
        run: |
          cd App
          
          for scheme in "Mobywatel" "Mobywatel-Package" "App"; do
            echo "Próbuję schemat: $scheme"
            xcodebuild clean archive \
              -project Mobywatel.xcodeproj \
              -scheme "$scheme" \
              -sdk iphoneos \
              -archivePath ../build/Mobywatel.xcarchive \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO && echo "Sukces ze schematem: $scheme" && break
          done

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/Mobywatel.xcarchive \
            -exportOptionsPlist ../ExportOptions.plist \
            -exportPath build

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Mobywatel-IPA
          path: build/*.ipa
