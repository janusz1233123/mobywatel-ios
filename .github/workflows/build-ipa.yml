name: Build Mobywatel IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with xcodebuild (Swift Package)
        run: |
          cd App
          
          echo "=== Budowanie aplikacji ==="
          
          xcodebuild clean archive \
            -scheme Mobywatel \
            -sdk iphoneos \
            -archivePath ../build/Mobywatel.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -destination 'generic/platform=iOS' || true

      - name: Export IPA
        run: |
          ls -la build/
          if [ -d "build/Mobywatel.xcarchive" ]; then
            xcodebuild -exportArchive \
              -archivePath build/Mobywatel.xcarchive \
              -exportOptionsPlist ../ExportOptions.plist \
              -exportPath build
            ls -la build/
          else
            echo "❌ Nie udało się utworzyć archiwum"
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Mobywatel-IPA
          path: build/*.ipa
