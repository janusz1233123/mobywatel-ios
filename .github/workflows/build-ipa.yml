name: Build Mobywatel IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Xcode Project
        run: |
          cd App
          swift package generate-xcodeproj || true

      - name: List Schemes
        run: |
          cd App
          echo "=== Dostępne schematy ==="
          xcodebuild -list -project *.xcodeproj || echo "Nie ma xcodeproj"

      - name: Build & Archive
        run: |
          cd App
          echo "=== Rozpoczynam budowanie ==="
          xcodebuild clean archive \
            -project Mobywatel.xcodeproj \
            -scheme "Mobywatel" \
            -sdk iphoneos \
            -archivePath ../build/Mobywatel.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO || echo "❌ BŁĄD BUDOWANIA - zobacz logi powyżej"
          
          ls -la ../build/

      - name: Export IPA
        run: |
          ls -la build/
          xcodebuild -exportArchive \
            -archivePath build/Mobywatel.xcarchive \
            -exportOptionsPlist ../ExportOptions.plist \
            -exportPath build || echo "Export nieudany"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Mobywatel-IPA
          path: build/*.ipa
